name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Generate config.js from secrets
        run: |
          cat > config.js << EOF
          var CONFIG = {
              SUPABASE_URL: '${{ secrets.SUPABASE_URL }}',
              SUPABASE_PUBLISHABLE_KEY: '${{ secrets.SUPABASE_PUBLISHABLE_KEY }}',
              APP_TITLE: '${{ vars.APP_TITLE || 'Listlet' }}',
              APP_CONTAINER: '${{ vars.APP_CONTAINER || 'default' }}',
              DEFAULT_LIST_NAME: 'demo'
          };
          EOF

      - name: Generate version.js
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          SHA=$(git rev-parse --short HEAD)
          MSG=$(git log -1 --pretty=%s)
          echo "var APP_VERSION = '${TIMESTAMP} ${SHA} ${MSG}';" > shared/version.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          exclude: |
            .github/**
            sql/**
            tests/**
            node_modules/**
            package.json
            package-lock.json
            jest.config.js
            playwright.config.js

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
