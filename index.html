<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Listlet</title>

    <!-- Shared styles -->
    <link rel="stylesheet" href="shared/common.css">
    <link rel="stylesheet" href="shared/auth.css">
    <link rel="stylesheet" href="shared/header.css">
    <link rel="stylesheet" href="shared/home.css">

    <!-- App styles -->
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <!-- Login page (hidden by default, shown by auth.js if not authenticated) -->
    <div id="login-page">
        <div class="login-card">
            <h1 id="loginTitle">Listlet</h1>
            <p>Sign in to continue</p>
            <button class="login-btn" id="googleLoginBtn" onclick="Auth.signInWithGoogle()">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- App container (hidden until authenticated) -->
    <div id="app-container" style="display: none;">
        <div id="header"></div>
        <div id="savingIndicator" class="saving-indicator">Saving...</div>
        <div id="app"></div>
    </div>

    <!-- Supabase CDN (graceful no-op if offline in mock mode) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Shared infrastructure -->
    <script src="shared/version.js"></script>
    <script src="shared/config-loader.js"></script>
    <script src="shared/supabase-client.js"></script>
    <script src="shared/utils.js"></script>
    <script src="shared/api.js"></script>
    <script src="shared/auth.js"></script>
    <script src="shared/home.js"></script>
    <script src="shared/header.js"></script>
    <script src="shared/sync.js"></script>

    <!-- App (replaceable) -->
    <script src="app.js"></script>

    <!-- Init -->
    <script>
        Auth.init(function(user) {
            Header.render(document.getElementById('header'), user);
            if (hasExplicitListName()) {
                App.init(document.getElementById('app'), getListName());
            } else {
                Home.render(document.getElementById('app'));
            }
        });

        // Update login page title from config
        var loginTitle = document.getElementById('loginTitle');
        if (loginTitle && typeof CONFIG !== 'undefined' && CONFIG.APP_TITLE) {
            loginTitle.textContent = CONFIG.APP_TITLE;
        }
    </script>
</body>
</html>
